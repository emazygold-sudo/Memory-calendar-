<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Calendar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #FDF8F3; color: #2D1810; padding: 20px; }
        .calendar { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #D4A574; color: white; padding: 20px; text-align: center; }
        .month-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .month-nav button { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 20px; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: #F3EDE7; padding: 12px; text-align: center; font-weight: bold; }
        .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 12px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; background: white; transition: all 0.2s; }
        .day:hover { background: #F3EDE7; }
        .day.selected { background: #D4A574; color: white; }
        .day.other-month { color: #ccc; }
        .events-panel { padding: 20px; border-top: 1px solid #E8DDD4; }
        .add-event { background: #D4A574; color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; margin-bottom: 16px; width: 100%; font-size: 16px; }
        .event { background: #FDF8F3; padding: 12px; margin-bottom: 8px; border-radius: 8px; border-left: 3px solid #D4A574; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 16px; padding: 20px; max-width: 90%; width: 400px; }
        .modal input, .modal textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #E8DDD4; border-radius: 8px; }
        .modal button { background: #D4A574; color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="calendar">
        <div class="header">
            <h1>📅 Memory Calendar</h1>
            <div class="month-nav">
                <button onclick="prevMonth()">←</button>
                <h2 id="monthYear"></h2>
                <button onclick="nextMonth()">→</button>
            </div>
        </div>
        <div class="weekdays">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div class="days" id="days"></div>
        <div class="events-panel">
            <button class="add-event" onclick="openModal()">+ Add Event</button>
            <div id="eventsList"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Add Event</h3>
            <input type="text" id="eventTitle" placeholder="Event title">
            <textarea id="eventDesc" placeholder="Description"></textarea>
            <button onclick="saveEvent()">Save</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDate = new Date().toISOString().split('T')[0];
        let events = JSON.parse(localStorage.getItem('events') || '{}');

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());

            document.getElementById('monthYear').innerText = 
                currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });

            const daysGrid = document.getElementById('days');
            daysGrid.innerHTML = '';

            for (let i = 0; i < 42; i++) {
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                const dayNum = date.getDate();
                const isCurrentMonth = date.getMonth() === month;
                const isSelected = dateStr === selectedDate;

                const dayDiv = document.createElement('div');
                dayDiv.className = `day ${!isCurrentMonth ? 'other-month' : ''} ${isSelected ? 'selected' : ''}`;
                dayDiv.innerText = dayNum;
                dayDiv.onclick = () => selectDate(dateStr);
                daysGrid.appendChild(dayDiv);
            }

            renderEvents();
        }

        function selectDate(dateStr) {
            selectedDate = dateStr;
            renderCalendar();
        }

        function renderEvents() {
            const eventsList = document.getElementById('eventsList');
            const dayEvents = events[selectedDate] || [];
            
            if (dayEvents.length === 0) {
                eventsList.innerHTML = '<p style="color: #999;">No events for this day</p>';
                return;
            }

            eventsList.innerHTML = dayEvents.map((event, idx) => `
                <div class="event">
                    <strong>${escapeHtml(event.title)}</strong>
                    ${event.description ? `<p style="margin-top: 4px; font-size: 14px;">${escapeHtml(event.description)}</p>` : ''}
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDesc').value = '';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function saveEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            const desc = document.getElementById('eventDesc').value;
            
            if (!title) {
                alert('Please enter an event title');
                return;
            }

            if (!events[selectedDate]) events[selectedDate] = [];
            events[selectedDate].push({ title, description: desc });
            localStorage.setItem('events', JSON.stringify(events));
            closeModal();
            renderCalendar();
        }

        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        renderCalendar();
    </script>
</body>
</html>
