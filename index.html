
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Calendar - Photo Diary</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #FDF8F3; color: #2D1810; padding: 20px; }
        .calendar { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #D4A574; color: white; padding: 20px; text-align: center; }
        .month-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .month-nav button { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 20px; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: #F3EDE7; padding: 12px; text-align: center; font-weight: bold; }
        .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 12px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; background: white; transition: all 0.2s; position: relative; }
        .day:hover { background: #F3EDE7; }
        .day.selected { background: #D4A574; color: white; }
        .day.other-month { color: #ccc; }
        .has-event { position: relative; }
        .has-event::after { content: ''; position: absolute; bottom: 4px; width: 6px; height: 6px; background: #D4A574; border-radius: 50%; }
        .day.selected.has-event::after { background: white; }
        .events-panel { padding: 20px; border-top: 1px solid #E8DDD4; max-height: 400px; overflow-y: auto; }
        .add-event { background: #D4A574; color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; margin-bottom: 16px; width: 100%; font-size: 16px; }
        .event { background: #FDF8F3; padding: 12px; margin-bottom: 12px; border-radius: 12px; border-left: 3px solid #D4A574; }
        .event-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .event-desc { font-size: 14px; color: #666; margin-bottom: 8px; }
        .event-photos { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .event-photo { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 16px; padding: 20px; max-width: 90%; width: 450px; max-height: 80%; overflow-y: auto; }
        .modal input, .modal textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #E8DDD4; border-radius: 8px; font-family: inherit; }
        .photo-preview { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
        .photo-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #D4A574; color: white; }
        .btn-secondary { background: #E8DDD4; color: #2D1810; }
        .btn-danger { background: #EF4444; color: white; }
        .photo-upload-btn { background: #B8956A; color: white; border: none; padding: 10px; border-radius: 8px; margin: 8px 0; cursor: pointer; width: 100%; }
        .fullscreen-photo { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 2000; cursor: pointer; }
        .fullscreen-photo img { max-width: 90%; max-height: 90%; object-fit: contain; }
    </style>
</head>
<body>
    <div class="calendar">
        <div class="header">
            <h1>📸 Memory Calendar</h1>
            <div class="month-nav">
                <button onclick="prevMonth()">←</button>
                <h2 id="monthYear"></h2>
                <button onclick="nextMonth()">→</button>
            </div>
        </div>
        <div class="weekdays">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div class="days" id="days"></div>
        <div class="events-panel">
            <button class="add-event" onclick="openModal()">+ Add Event with Photo</button>
            <div id="eventsList"></div>
        </div>
    </div>

    <!-- Add Event Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <h3>Add Memory</h3>
            <input type="text" id="eventTitle" placeholder="Event title" required>
            <textarea id="eventDesc" placeholder="Description" rows="3"></textarea>
            <button class="photo-upload-btn" onclick="uploadPhoto()">📷 Add Photo</button>
            <div id="photoPreview" class="photo-preview"></div>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="saveEvent()">Save</button>
            </div>
        </div>
    </div>

    <!-- Fullscreen Photo Viewer -->
    <div id="fullscreenViewer" class="fullscreen-photo" style="display: none;" onclick="closeFullscreen()">
        <img id="fullscreenImage" src="">
    </div>

    <script>
        let currentDate = new Date();
        let selectedDate = new Date().toISOString().split('T')[0];
        let events = JSON.parse(localStorage.getItem('events') || '{}');
        let currentPhotos = [];

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());

            document.getElementById('monthYear').innerText = 
                currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });

            const daysGrid = document.getElementById('days');
            daysGrid.innerHTML = '';

            for (let i = 0; i < 42; i++) {
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                const dayNum = date.getDate();
                const isCurrentMonth = date.getMonth() === month;
                const isSelected = dateStr === selectedDate;
                const hasEvent = events[dateStr] && events[dateStr].length > 0;

                const dayDiv = document.createElement('div');
                dayDiv.className = `day ${!isCurrentMonth ? 'other-month' : ''} ${isSelected ? 'selected' : ''} ${hasEvent ? 'has-event' : ''}`;
                dayDiv.innerText = dayNum;
                dayDiv.onclick = () => selectDate(dateStr);
                daysGrid.appendChild(dayDiv);
            }

            renderEvents();
        }

        function selectDate(dateStr) {
            selectedDate = dateStr;
            renderCalendar();
        }

        function renderEvents() {
            const eventsList = document.getElementById('eventsList');
            const dayEvents = events[selectedDate] || [];
            
            if (dayEvents.length === 0) {
                eventsList.innerHTML = '<p style="color: #999; text-align: center;">No memories for this day. Tap + to add one!</p>';
                return;
            }

            eventsList.innerHTML = dayEvents.map((event, idx) => `
                <div class="event">
                    <div class="event-title">📌 ${escapeHtml(event.title)}</div>
                    ${event.description ? `<div class="event-desc">${escapeHtml(event.description)}</div>` : ''}
                    ${event.photos && event.photos.length > 0 ? `
                        <div class="event-photos">
                            ${event.photos.map(photo => `<img src="${photo}" class="event-photo" onclick="viewPhoto('${photo}')">`).join('')}
                        </div>
                    ` : ''}
                    <button class="btn-danger" style="margin-top: 8px; padding: 4px 8px; font-size: 12px;" onclick="deleteEvent('${selectedDate}', ${idx})">Delete</button>
                </div>
            `).join('');
        }

        function openModal() {
            document.getElementById('eventModal').style.display = 'flex';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDesc').value = '';
            currentPhotos = [];
            document.getElementById('photoPreview').innerHTML = '';
        }

        function closeModal() {
            document.getElementById('eventModal').style.display = 'none';
        }

        function uploadPhoto() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        currentPhotos.push(event.target.result);
                        updatePhotoPreview();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function updatePhotoPreview() {
            const preview = document.getElementById('photoPreview');
            preview.innerHTML = currentPhotos.map((photo, idx) => `
                <div style="position: relative;">
                    <img src="${photo}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
                    <button onclick="removePhoto(${idx})" style="position: absolute; top: -8px; right: -8px; background: #EF4444; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer;">×</button>
                </div>
            `).join('');
        }

        function removePhoto(index) {
            currentPhotos.splice(index, 1);
            updatePhotoPreview();
        }

        function saveEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            if (!title) {
                alert('Please enter an event title');
                return;
            }

            const desc = document.getElementById('eventDesc').value;

            if (!events[selectedDate]) events[selectedDate] = [];
            events[selectedDate].push({
                title: title,
                description: desc,
                photos: [...currentPhotos],
                date: new Date().toISOString()
            });
            
            localStorage.setItem('events', JSON.stringify(events));
            closeModal();
            renderCalendar();
        }

        function deleteEvent(date, index) {
            if (confirm('Delete this memory?')) {
                events[date].splice(index, 1);
                if (events[date].length === 0) delete events[date];
                localStorage.setItem('events', JSON.stringify(events));
                renderCalendar();
            }
        }

        function viewPhoto(photoSrc) {
            document.getElementById('fullscreenImage').src = photoSrc;
            document.getElementById('fullscreenViewer').style.display = 'flex';
        }

        function closeFullscreen() {
            document.getElementById('fullscreenViewer').style.display = 'none';
        }

        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        renderCalendar();
    </script>
</body>
</html>
